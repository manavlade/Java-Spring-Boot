<div class="flex flex-wrap justify-center gap-6 px-10 py-4" id="home">
  @for (card of statCards; track card.label) {
  <div class="bg-white shadow-md rounded-xl p-6 w-60 border border-gray-100 hover:shadow-lg transition-all duration-200">
    <div class="text-sm text-gray-500 font-medium mb-2">
      {{ card.label }}
    </div>
    <div class="text-2xl font-semibold text-gray-800">
      {{ card.value }}
    </div>
    <div class="text-xs text-gray-400 mt-2">
      {{ card.sub }}
    </div>

  </div>
  }
</div>

<div id="main" style="width: 100%; height: 470px;" class="md:text-xl"></div>
