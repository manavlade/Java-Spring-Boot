<div id="page-content" >
  <div class="flex space-x-4 mb-4 items-center justify-center py-4">
    @for (chart of chartTypes; track chart) {
    <button (click)="activeChart = chart" [class.bg-blue-600]="activeChart === chart"
      [class.text-white]="activeChart === chart" class="border p-4 rounded-lg cursor-pointer capitalize">
      {{ chart }} Chart
    </button>
    }
  </div>

  <app-echarts-graph [type]="activeChart" [salaryData]="dashboardData">
  </app-echarts-graph>
</div>
